<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Silver Madness 2">
<meta name="theme-color" content="#070c18">
<title>Silver Madness 2 — World Cup Warrior</title>
<style>
:root{
  --bg:#070c18; --card:#111827; --card2:#1a2236; --border:#243052;
  --text:#e2e8f0; --muted:#8896b3; --orange:#f97316; --blue:#3b82f6;
  --green:#22c55e; --red:#ef4444; --purple:#a855f7; --pink:#ec4899;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
body{background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; min-height:100vh; -webkit-text-size-adjust:100%;}
button{font-family:inherit; cursor:pointer;}
.hidden{display:none !important;}
.btn{padding:.6rem 1.1rem; border-radius:.55rem; border:none; font-size:.9rem; font-weight:700; transition:filter .15s, background .15s;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--orange); color:#fff;} .btn-primary:hover{filter:brightness(1.08);}
.btn-blue{background:var(--blue); color:#fff;}
.btn-green{background:var(--green); color:#fff;}
.btn-ghost{background:var(--card2); color:var(--text); border:1px solid var(--border);}
.btn-ghost:hover{border-color:var(--muted);}
.btn-sm{padding:.35rem .7rem; font-size:.78rem; border-radius:.45rem;}

/* PASSWORD */
.pw-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem;}
.pw-card{background:var(--card); border:1px solid var(--border); border-radius:1rem; padding:2.5rem 2rem; width:100%; max-width:400px; text-align:center;}
.pw-card .logo{font-size:1.4rem; font-weight:800; color:var(--orange); margin-bottom:.4rem;}
.pw-card .tag{color:var(--muted); font-size:.8rem; margin-bottom:1.5rem; letter-spacing:.02em;}
.pw-card input{width:100%; padding:.85rem 1rem; background:var(--card2); border:1px solid var(--border); border-radius:.6rem; color:var(--text); font-size:16px; text-align:center; letter-spacing:.15em; margin-bottom:.75rem; outline:none;}
.pw-card input:focus{border-color:var(--orange);}
.pw-err{color:var(--red); font-size:.8rem; height:1rem; margin-top:.2rem;}

/* HEADER / NAV */
header{background:var(--card); border-bottom:1px solid var(--border); padding:calc(.7rem + var(--safe-t)) 1rem .7rem; position:sticky; top:0; z-index:100;}
.head-row{display:flex; align-items:center; gap:1rem; flex-wrap:wrap;}
.logo{font-size:1.05rem; font-weight:800; color:var(--orange); white-space:nowrap;}
.logo small{color:var(--muted); font-weight:600; font-size:.7rem; display:block; letter-spacing:.03em;}
.top-nav{display:flex; gap:.25rem; margin-left:auto; flex-wrap:wrap;}
.nav-btn{padding:.5rem .9rem; border-radius:.5rem; border:none; background:transparent; color:var(--muted); font-size:.85rem; font-weight:600;}
.nav-btn.active{background:var(--card2); color:var(--text);}
.nav-btn:hover{color:var(--text);}

main{max-width:1100px; margin:0 auto; padding:1rem 1rem calc(1rem + var(--safe-b));}
@media(max-width:760px){ main{padding-bottom:calc(74px + var(--safe-b));} }

/* BOTTOM NAV (mobile) */
.bottom-nav{display:none;}
@media(max-width:760px){
  .top-nav{display:none;}
  .bottom-nav{display:flex; position:fixed; bottom:0; left:0; right:0; z-index:200;
    background:#0a1120; border-top:1px solid var(--border); padding:.5rem .25rem var(--safe-b);}
  .bn-item{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--muted); padding:.3rem 0; min-height:48px;}
  .bn-item .ti{font-size:1.35rem;}
  .bn-item span{font-size:.6rem; font-weight:600;}
  .bn-item.active{color:var(--orange);}
}

/* GENERIC */
h2.page-title{font-size:1.2rem; font-weight:800; margin-bottom:.85rem;}
.card{background:var(--card); border:1px solid var(--border); border-radius:.75rem; padding:1rem 1.1rem;}
.muted{color:var(--muted);}
.empty-state{text-align:center; color:var(--muted); padding:3rem 1rem;}
.empty-state .ti{font-size:2.5rem; display:block; margin-bottom:.6rem; opacity:.5;}
.pill{display:inline-flex; align-items:center; border-radius:999px; padding:.12rem .5rem; font-size:.62rem; font-weight:700; background:var(--card2); color:var(--muted);}
.pill.elig{background:rgba(34,197,94,.15); color:var(--green);}
.pos-chip{display:inline-flex; background:var(--card2); color:var(--muted); font-size:.6rem; font-weight:700; padding:.12rem .4rem; border-radius:.25rem;}

/* STATUS BAR */
.status-bar{background:var(--card); border:1px solid var(--border); border-radius:.75rem; padding:1rem 1.1rem; margin-bottom:1rem;}
.status-badges{display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; margin-bottom:.55rem;}
.status-badge{background:var(--orange); color:#fff; border-radius:999px; padding:.28rem .8rem; font-size:.74rem; font-weight:700;}
.status-badge.blue{background:var(--blue);} .status-badge.muted{background:var(--card2); color:var(--muted);}
.req-note{border-radius:.5rem; padding:.5rem .8rem; font-size:.78rem; margin-top:.5rem;}
.req-ok{background:rgba(34,197,94,.1); border:1px solid var(--green); color:var(--green);}
.req-warn{background:rgba(249,115,22,.1); border:1px solid var(--orange); color:var(--orange);}

/* DRAFT BOARD (desktop oriented) */
.board-scroll{overflow-x:auto; border-radius:.75rem; -webkit-overflow-scrolling:touch;}
.draft-grid{display:grid; gap:1px; background:var(--border); border:1px solid var(--border); border-radius:.75rem; overflow:hidden; min-width:780px;}
.dg-head{background:var(--card2); padding:.55rem .35rem; font-size:.66rem; font-weight:700; text-align:center; color:var(--muted); text-transform:uppercase; letter-spacing:.03em;}
.dg-head.current{background:rgba(249,115,22,.18); color:var(--orange);}
.dg-rl{background:var(--card2); display:flex; align-items:center; justify-content:center; font-size:.66rem; font-weight:700; color:var(--muted);}
.dg-cell{background:var(--card); padding:.35rem .4rem; min-height:52px; display:flex; flex-direction:column; justify-content:center; gap:.1rem;}
.dg-cell.current-slot{background:rgba(249,115,22,.08); box-shadow:inset 0 0 0 2px var(--orange);}
.dg-name{font-size:.72rem; font-weight:700; line-height:1.1;}
.dg-team{font-size:.6rem; color:var(--muted);}
.dg-elig{width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-left:3px;}

/* PICKER */
.picker{margin-top:1rem;}
.picker-controls{display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:.7rem;}
.picker input[type=text]{flex:1; min-width:160px; padding:.6rem .8rem; background:var(--card2); border:1px solid var(--border); border-radius:.55rem; color:var(--text); font-size:16px; outline:none;}
.picker input[type=text]:focus{border-color:var(--orange);}
.filter-chip{padding:.4rem .75rem; border-radius:.5rem; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:.76rem; font-weight:700;}
.filter-chip.active{background:var(--orange); color:#fff; border-color:var(--orange);}
.filter-chip.elig.active{background:var(--green); border-color:var(--green);}
.player-list{display:flex; flex-direction:column; gap:.4rem; max-height:460px; overflow-y:auto;}
.pl-row{display:flex; align-items:center; gap:.55rem; background:var(--card); border:1px solid var(--border); border-radius:.55rem; padding:.55rem .7rem;}
.pl-row.elig{border-color:rgba(34,197,94,.4);}
.pl-name{flex:1; font-size:.86rem; font-weight:600;}
.pl-draft{background:var(--orange); color:#fff; border:none; padding:.4rem .8rem; border-radius:.45rem; font-size:.74rem; font-weight:700; min-height:36px;}

/* STANDINGS */
.stand-row{display:flex; align-items:center; gap:.6rem; padding:.5rem 0;}
.stand-rank{width:24px; font-weight:800; color:var(--muted); text-align:right; font-size:.85rem;}
.stand-name{width:90px; font-size:.85rem; font-weight:600; flex-shrink:0;}
.stand-bar{flex:1; height:22px; background:var(--card2); border-radius:.3rem; overflow:hidden;}
.stand-fill{height:100%; background:var(--orange);}
.stand-pts{width:42px; text-align:right; font-weight:800; font-size:.92rem;}

/* SQUAD ACCORDION */
.squad-tabs{display:flex; gap:.35rem; overflow-x:auto; padding-bottom:.5rem; margin-bottom:.6rem; -webkit-overflow-scrolling:touch;}
.squad-tab{white-space:nowrap; padding:.45rem .8rem; border-radius:.5rem; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:.78rem; font-weight:700;}
.squad-tab.active{background:var(--card2); color:var(--text); border-color:var(--muted);}
.squad-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:.6rem;}
.squad-total{font-size:.8rem; color:var(--muted);} .squad-total b{color:var(--text); font-size:1rem;}
.expand-toggle{background:none; border:none; color:var(--blue); font-size:.76rem; font-weight:700;}
.pcard{background:var(--card); border:1px solid var(--border); border-radius:.6rem; margin-bottom:.5rem; overflow:hidden;}
.pcard.out{opacity:.58;}
.pcard-head{display:flex; align-items:center; gap:.55rem; padding:.7rem .8rem; cursor:pointer; min-height:48px;}
.pcard-name{flex:1; font-size:.9rem; font-weight:600;}
.pcard-name .strike{text-decoration:line-through;}
.pcard-total{font-size:.95rem; font-weight:800; color:var(--orange);}
.pcard-total.dim{color:var(--text);}
.chev{color:var(--muted); font-size:1.1rem; transition:transform .2s;}
.pcard.open .chev{transform:rotate(180deg);}
.pcard-body{padding:0 .8rem .8rem; display:none;}
.pcard.open .pcard-body{display:block;}
.round-bar{display:flex; height:7px; border-radius:4px; overflow:hidden; background:var(--card2); margin-bottom:.5rem;}
.ledger-row{display:flex; align-items:flex-start; gap:.5rem; background:#0d1322; border-radius:.45rem; padding:.45rem .6rem; margin-bottom:.35rem;}
.ledger-rnd{font-size:.6rem; font-weight:700; color:var(--muted); background:var(--card2); padding:.15rem .4rem; border-radius:.25rem; min-width:34px; text-align:center; margin-top:1px;}
.ledger-rnd.knock{background:rgba(168,85,247,.18); color:var(--purple);}
.chips{flex:1; display:flex; flex-wrap:wrap; gap:.25rem;}
.chip{font-size:.66rem; font-weight:600; padding:.12rem .45rem; border-radius:.35rem; background:var(--card2); color:#94a3b8;}
.chip.goal{background:rgba(249,115,22,.16); color:#fb923c;}
.chip.assist{background:rgba(59,130,246,.16); color:#60a5fa;}
.chip.cs{background:rgba(34,197,94,.16); color:#4ade80;}
.chip.neg{background:rgba(239,68,68,.16); color:#f87171;}
.ledger-pts{font-size:.78rem; font-weight:800; margin-top:1px;}

/* TABLES */
.tbl{width:100%; border-collapse:collapse; font-size:.82rem;}
.tbl th{text-align:left; color:var(--muted); font-weight:700; font-size:.7rem; text-transform:uppercase; letter-spacing:.03em; padding:.5rem .4rem; border-bottom:1px solid var(--border);}
.tbl td{padding:.5rem .4rem; border-bottom:1px solid var(--border);}
.tbl tr:last-child td{border-bottom:none;}
.scroll-x{overflow-x:auto; -webkit-overflow-scrolling:touch;}

/* SCORING RUBRIC */
.rubric-grid{display:grid; grid-template-columns:1fr auto; gap:.1rem .5rem;}
.rubric-row{display:contents;}
.rubric-row > div{padding:.55rem .2rem; border-bottom:1px solid var(--border);}
.rubric-label{color:var(--text); font-size:.86rem;}
.rubric-val{text-align:right; font-weight:800; font-family:ui-monospace,monospace;}
.rubric-val.pos{color:var(--green);} .rubric-val.neg{color:var(--red);}
.section-h{font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:700; margin:1.1rem 0 .4rem;}

.toolbar{display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem;}
.banner{background:rgba(59,130,246,.1); border:1px solid var(--blue); border-radius:.6rem; padding:.7rem .9rem; font-size:.8rem; color:#bfdbfe; margin-bottom:1rem; display:flex; gap:.5rem; align-items:flex-start;}
.banner .ti{color:var(--blue); font-size:1.1rem; flex-shrink:0;}
</style>

    <div class="pw-err" id="pwErr"></div>
    <button class="btn btn-primary" style="width:100%;" onclick="checkPw()">Enter</button>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <div class="head-row">
      <div class="logo">Silver Madness 2<small>WORLD CUP WARRIOR · 2022 TEST BUILD</small></div>
      <nav class="top-nav" id="topNav"></nav>
    </div>
  </header>

  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<script>
// ============================================================
// Silver Madness 2 — scoring engine + curated 2022 test data
// This module is the single source of truth for scoring.
// Validated in node before being embedded into the app.
// ============================================================

// ---- SCORING CONFIG (single source of truth; Scoring tab renders from this) ----
const SCORING = {
  goal:        { GK: 6, DEF: 6, MID: 5, FWD: 4 },
  assist:      3,
  appearance:  1,      // played 1-59 minutes
  played60:    2,      // played 60+ minutes
  cleanSheet:  { GK: 4, DEF: 4, MID: 1, FWD: 0 }, // requires 60+ min, team conceded 0
  yellow:     -1,
  red:        -3,
  ownGoal:    -2,
  penMiss:    -2,
};

// Round keys for 2022 (32-team format). 2026 will insert 'r32' after group.
const ROUNDS_2022 = ['group', 'r16', 'qf', 'sf', 'final'];
const ROUND_LABEL = { group: 'Group', r32: 'R32', r16: 'R16', qf: 'QF', sf: 'SF', final: 'Final' };

// ---- TEAMS: 2022-era FIFA rank + stage reached ----
// stage: group | r16 | qf | sf | final | champion
const TEAMS = {

  URU: { name: 'Uruguay',      rank: 14, stage: 'group' },
  GHA: { name: 'Ghana',        rank: 61, stage: 'group' },
};

const STAGE_ORDER = { group: 0, r16: 1, qf: 2, sf: 3, final: 4, champion: 5 };
// teams ranked 40th or lower satisfy the draft requirement
function eligibleUnderdog(code) { return TEAMS[code].rank >= 40; }

// ---- PLAYERS ----
// matches: array of stat lines {r, g, a, min, cs, yc, rc, og, pm}
// Only fields that occur need be present. Accurate goals/assists for notable
// players; appearance/minutes filled to plausible values for squad depth.
// m(round, goals, assists, minutes, opts) helper to keep data compact.
function m(r, g = 0, a = 0, min = 90, opts = {}) {
  return Object.assign({ r, g, a, min, cs: false, yc: 0, rc: 0, og: 0, pm: 0 }, opts);
}

const PLAYERS = [

  { id: 'arg-messi', name: 'Lionel Messi', team: 'ARG', pos: 'FWD', matches: [
    m('group',1,1,90),m('group',0,0,90),m('group',2,0,90),

  { id: 'arg-alvarez', name: 'Julián Álvarez', team: 'ARG', pos: 'FWD', matches: [

  { id: 'arg-dimaria', name: 'Ángel Di María', team: 'ARG', pos: 'MID', matches: [
    m('group',0,0,63),m('r16',0,1,90),m('final',1,0,64) ] },
  { id: 'arg-mac', name: 'Enzo Fernández', team: 'ARG', pos: 'MID', matches: [
    m('group',1,0,58),m('group',0,0,90),m('r16',0,0,90),m('qf',0,0,120),m('sf',0,0,90),m('final',0,0,120) ] },
  { id: 'arg-molina', name: 'Nahuel Molina', team: 'ARG', pos: 'DEF', matches: [
    m('group',0,0,90),m('qf',1,0,120),m('sf',0,1,90),m('final',0,0,120,{cs:false}) ] },
  { id: 'arg-otamendi', name: 'Nicolás Otamendi', team: 'ARG', pos: 'DEF', matches: [
    m('group',0,0,90,{cs:true}),m('group',0,0,90),m('r16',0,0,90),m('qf',0,0,120),m('sf',0,0,90,{cs:true}),m('final',0,0,120) ] },

    m('group',0,0,90),m('group',0,0,90,{cs:true}),m('r16',0,0,90),m('qf',0,0,120),m('sf',0,0,90,{cs:true}),m('final',0,0,120) ] },

    m('group',1,1,90),m('r16',0,1,90),m('qf',0,0,120),m('sf',0,0,77),m('final',0,0,116) ] },

  // ---------------- FRANCE (final) ----------------
  { id: 'fra-mbappe', name: 'Kylian Mbappé', team: 'FRA', pos: 'FWD', matches: [

  { id: 'fra-giroud', name: 'Olivier Giroud', team: 'FRA', pos: 'FWD', matches: [

  { id: 'fra-griezmann', name: 'Antoine Griezmann', team: 'FRA', pos: 'MID', matches: [
    m('group',0,1,90),m('group',0,1,90),m('r16',0,1,90),m('qf',0,0,90),m('sf',0,0,90),m('final',0,0,120) ] },

  { id: 'fra-tchouameni', name: 'Aurélien Tchouaméni', team: 'FRA', pos: 'MID', matches: [
    m('group',0,0,90),m('r16',0,1,90),m('qf',0,0,90),m('sf',0,0,90),m('final',0,0,120,{yc:1}) ] },
  { id: 'fra-theo', name: 'Theo Hernández', team: 'FRA', pos: 'DEF', matches: [
    m('group',0,0,90),m('sf',1,0,90),m('final',0,0,120) ] },
  { id: 'fra-koundé', name: 'Jules Koundé', team: 'FRA', pos: 'DEF', matches: [
    m('group',0,0,90),m('r16',0,0,90),m('qf',0,1,90),m('final',0,0,120) ] },
  { id: 'fra-lloris', name: 'Hugo Lloris', team: 'FRA', pos: 'GK', matches: [
    m('group',0,0,90),m('r16',0,0,90,{cs:true}),m('qf',0,0,90),m('sf',0,0,90,{cs:true}),m('final',0,0,120) ] },
  { id: 'fra-rabiot', name: 'Adrien Rabiot', team: 'FRA', pos: 'MID', matches: [
    m('group',1,0,90),m('r16',0,1,90),m('qf',0,0,90),m('final',0,0,76) ] },

// ---- ENGINE ----
function matchPoints(player, line) {
  const s = SCORING;
  let pts = 0;
  const parts = [];
  if (line.g) { const v = s.goal[player.pos] * line.g; pts += v; parts.push({ label: `Goal +${s.goal[player.pos]}${line.g > 1 ? ' ×' + line.g : ''}`, v, sign: 1 }); }
  if (line.a) { const v = s.assist * line.a; pts += v; parts.push({ label: `Assist +${s.assist}${line.a > 1 ? ' ×' + line.a : ''}`, v, sign: 1 }); }
  if (line.min >= 60) { pts += s.played60; parts.push({ label: `60+ min +${s.played60}`, v: s.played60, sign: 1 }); }
  else if (line.min >= 1) { pts += s.appearance; parts.push({ label: `Appearance +${s.appearance}`, v: s.appearance, sign: 1 }); }
  if (line.cs && line.min >= 60 && s.cleanSheet[player.pos] > 0) { const v = s.cleanSheet[player.pos]; pts += v; parts.push({ label: `Clean sheet +${v}`, v, sign: 1 }); }
  if (line.yc) { const v = s.yellow * line.yc; pts += v; parts.push({ label: `Yellow ${v}`, v, sign: -1 }); }
  if (line.rc) { const v = s.red * line.rc; pts += v; parts.push({ label: `Red ${v}`, v, sign: -1 }); }
  if (line.og) { const v = s.ownGoal * line.og; pts += v; parts.push({ label: `Own goal ${v}`, v, sign: -1 }); }
  if (line.pm) { const v = s.penMiss * line.pm; pts += v; parts.push({ label: `Pen miss ${v}`, v, sign: -1 }); }
  return { pts, parts };
}

function playerTotals(player, rounds) {
  const byRound = {}; rounds.forEach(r => byRound[r] = 0);
  let total = 0;
  player.matches.forEach(line => { const { pts } = matchPoints(player, line); byRound[line.r] += pts; total += pts; });
  return { total, byRound };
}

const PICKS_PER = 10;
const TOTAL_PICKS = NUM_MGR * PICKS_PER;
const REQUIRE_ELIGIBLE = 2;            // >=2 players from teams ranked 40th or lower
const ROUNDS = ROUNDS_2022;            // 2022 test build
const POS_ORDER = { GK:0, DEF:1, MID:2, FWD:3 };

/* ============ DATA-LAYER ABSTRACTION ============
   The app never reads PLAYERS/TEAMS directly in UI code; it goes through
   `provider`. Swapping in Supabase or a live stats feed later means
   reimplementing these methods only. Scoring always joins by stable id,
   never by name — see resolveId() for the name crosswalk. */
const NAME_CROSSWALK = {
  // alias (normalized) -> canonical player id. Illustrative entries; the live
  // build populates this where a feed's name differs from our display name.
  'kylian mbappe lottin':'fra-mbappe', 'leo messi':'arg-messi',
  'son heungmin':'kor-son', 'cho guesung':'kor-cho'
};
function normName(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').replace(/\b(jr|sr|ii|iii)\b/g,'').replace(/\s+/g,' ').trim(); }
const _byId = Object.fromEntries(PLAYERS.map(p=>[p.id,p]));
const _byNorm = {}; PLAYERS.forEach(p=>{ _byNorm[normName(p.name)] = p.id; });
function resolveId(nameOrId){
  if(_byId[nameOrId]) return nameOrId;
  const n = normName(nameOrId);
  if(NAME_CROSSWALK[n]) return NAME_CROSSWALK[n];
  if(_byNorm[n]) return _byNorm[n];
  return null;
}
const provider = {
  getPlayer:(id)=>_byId[id],
  getPlayers:()=>PLAYERS,
  getTeam:(code)=>TEAMS[code],
  totals:(id)=>playerTotals(_byId[id], ROUNDS),
  isEligible:(id)=>eligibleUnderdog(_byId[id].team),
};

function saveState(){ try{ localStorage.setItem('sm2_state', JSON.stringify(state)); }catch(e){} }
function loadState(){ try{ const s=localStorage.getItem('sm2_state'); if(s){ state=JSON.parse(s); } }catch(e){} }

/* ============ DRAFT MATH (snake) ============ */
function pickerForIndex(n){ const r=Math.floor(n/NUM_MGR); const i=n%NUM_MGR; return (r%2===0)? i : (NUM_MGR-1-i); }
function currentPickInfo(){
  const n = state.picks.length;
  if(n>=TOTAL_PICKS) return null;
  return { overall:n, round:Math.floor(n/NUM_MGR)+1, mgrIdx:pickerForIndex(n), pickInRound:(n%NUM_MGR)+1 };
}
function squadOf(mgrIdx){ return state.picks.filter(p=>p.mgrIdx===mgrIdx); }
function eligibleCount(mgrIdx){ return squadOf(mgrIdx).filter(p=>provider.isEligible(p.playerId)).length; }
function draftedIds(){ return new Set(state.picks.map(p=>p.playerId)); }
function isDraftComplete(){ return state.picks.length>=TOTAL_PICKS; }

/* must the current picker take an eligible player to stay able to hit 2? */
function mustPickEligible(mgrIdx){
  const sq = squadOf(mgrIdx);
  const have = sq.filter(p=>provider.isEligible(p.playerId)).length;
  const remainingAfter = PICKS_PER - sq.length - 1; // picks left for this mgr after current
  return (REQUIRE_ELIGIBLE - have) > remainingAfter;
}
function canDraft(mgrIdx, playerId){
  if(mustPickEligible(mgrIdx) && !provider.isEligible(playerId)) return false;
  return true;
}
function makePick(playerId){
  const info = currentPickInfo(); if(!info) return;
  if(draftedIds().has(playerId)) return;
  if(!canDraft(info.mgrIdx, playerId)){ alert(MANAGERS[info.mgrIdx]+' must use this pick on a team ranked 40th or lower to meet the requirement.'); return; }
  state.picks.push({ mgrIdx:info.mgrIdx, playerId, overall:info.overall });
  state.started = true; saveState(); render();
}
function undoLast(){ if(state.picks.length){ state.picks.pop(); saveState(); render(); } }
function editPick(overall){
  const pk = state.picks.find(p=>p.overall===overall); if(!pk) return;
  const name = prompt('Replace this pick with which player? Type a player name:'); if(!name) return;
  const id = resolveId(name);
  if(!id){ alert('No player matched "'+name+'". Check spelling.'); return; }
  if(draftedIds().has(id) && id!==pk.playerId){ alert('That player is already drafted.'); return; }
  pk.playerId = id; saveState(); render();
}
function clearDraft(){ if(confirm('Clear the entire draft?')){ state={picks:[],started:false}; saveState(); render(); } }

/* ============ 2022 SIMULATION (auto-draft) ============ */
function seededRand(seed){ let s=seed%2147483647; if(s<=0)s+=2147483646; return ()=>(s=s*16807%2147483647)/2147483647; }
function runSimulation(){
  state = { picks:[], started:true };
  const rnd = seededRand(20221218);
  // pre-tournament desirability: stronger team + attacking position + jitter
  const rating = {};
  PLAYERS.forEach(p=>{
    const teamStrength = 220 - provider.getTeam(p.team).rank;
    const posW = { FWD:35, MID:25, DEF:14, GK:10 }[p.pos];
    rating[p.id] = teamStrength + posW + rnd()*40;
  });
  const taken = new Set();
  for(let n=0;n<TOTAL_PICKS;n++){
    const mgrIdx = pickerForIndex(n);
    const forceElig = mustPickEligible(mgrIdx);
    let pool = PLAYERS.filter(p=>!taken.has(p.id) && (!forceElig || eligibleUnderdog(p.team)));
    pool.sort((a,b)=>rating[b.id]-rating[a.id]);
    const pick = pool[0];
    taken.add(pick.id);
    state.picks.push({ mgrIdx, playerId:pick.id, overall:n });
  }
  saveState(); ui.page='standings'; render();
}

/* ============ STANDINGS ============ */
function standings(){
  return MANAGERS.map((name,idx)=>{
    let total=0; squadOf(idx).forEach(p=>{ total+=provider.totals(p.playerId).total; });
    return { idx, name, total, count:squadOf(idx).length };
  }).sort((a,b)=>b.total-a.total);
}

          : `Requirement: ${have} of ${REQUIRE_ELIGIBLE} players from teams ranked 40th or lower.`}

function draftBoard(){
  const info=currentPickInfo();
  let cols='40px '+Array(NUM_MGR).fill('minmax(86px,1fr)').join(' ');
  let html=`<div class="board-scroll"><div class="draft-grid" style="grid-template-columns:${cols}">`;
  html+=`<div class="dg-head"></div>`;
  for(let i=0;i<NUM_MGR;i++){ const cur=info&&info.mgrIdx===i; html+=`<div class="dg-head ${cur?'current':''}">${MANAGERS[i].replace('Manager ','')}</div>`; }
  for(let r=0;r<PICKS_PER;r++){
    html+=`<div class="dg-rl">${r+1}</div>`;
    for(let c=0;c<NUM_MGR;c++){
      const overall=r*NUM_MGR+(r%2===0?c:(NUM_MGR-1-c));
      const pk=state.picks.find(p=>p.overall===overall);
      const isCur=info&&info.overall===overall;
      if(pk){ const pl=provider.getPlayer(pk.playerId); const el=provider.isEligible(pk.playerId);
        html+=`<div class="dg-cell"><div class="dg-name">${pl.name}${el?'<span class="dg-elig"></span>':''}</div><div class="dg-team">${pl.team} · ${pl.pos}</div></div>`;
      } else { html+=`<div class="dg-cell ${isCur?'current-slot':''}">${isCur?'<div class="dg-team" style="color:var(--orange);font-weight:700">on the clock</div>':''}</div>`; }
    }
  }
  html+='</div></div>';
  return html;
}
function pickerRows(){
  const info=currentPickInfo();
  const taken=draftedIds();
  let list=PLAYERS.filter(p=>!taken.has(p.id));
  if(ui.filter==='elig') list=list.filter(p=>provider.isEligible(p.id));
  else if(['GK','DEF','MID','FWD'].includes(ui.filter)) list=list.filter(p=>p.pos===ui.filter);
  if(ui.search){ const q=normName(ui.search); list=list.filter(p=>normName(p.name).includes(q)||p.team.toLowerCase().includes(ui.search.toLowerCase())); }
  list.sort((a,b)=>provider.totals(b.id).total-provider.totals(a.id).total);
  const rows=list.slice(0,120).map(p=>{
    const el=provider.isEligible(p.id); const t=provider.getTeam(p.team);
    const blocked=info&&!canDraft(info.mgrIdx,p.id);
    return `<div class="pl-row ${el?'elig':''}">
      <span class="pos-chip">${p.pos}</span>
      <span class="pl-name">${p.name} <span class="muted" style="font-weight:400">· ${t.name}</span></span>
      <span class="pill ${el?'elig':''}">#${t.rank}</span>
      <button class="pl-draft" ${blocked?'style="opacity:.4" title="requirement"':''} onclick="makePick('${p.id}')">Draft</button>
    </div>`;
  }).join('');
  return { rows, count:list.length };
}
function picker(){
  if(isDraftComplete()) return '';

}

function toggleAll(m){ const sq=squadOf(m); const open=allOpen(m); sq.forEach(pk=>ui.expanded[pk.playerId]=!open); render(); }
function togglePlayer(id){ ui.expanded[id]=!ui.expanded[id]; render(); }
function playerCard(pl,pk){
  const tot=provider.totals(pl.id); const t=provider.getTeam(pl.team);
  const el=provider.isEligible(pl.id); const open=!!ui.expanded[pl.id];
  const stageTag=stageLabel(t.stage);
  // round bar
  const roundColors={group:'var(--orange)',r32:'var(--blue)',r16:'var(--blue)',qf:'var(--green)',sf:'var(--purple)',final:'var(--pink)'};
  const bar=ROUNDS.map(r=>{ const v=tot.byRound[r]; return v>0?`<span style="width:${v/Math.max(1,tot.total)*100}%;background:${roundColors[r]}"></span>`:''; }).join('');
  // ledger
  const ledger=pl.matches.map(line=>{
    const {pts,parts}=matchPoints(pl,line);
    const chips=parts.map(pt=>{ let cls='chip'; if(pt.label.startsWith('Goal'))cls+=' goal'; else if(pt.label.startsWith('Assist'))cls+=' assist'; else if(pt.label.startsWith('Clean'))cls+=' cs'; else if(pt.sign<0)cls+=' neg'; return `<span class="${cls}">${pt.label}</span>`; }).join('');
    const knock=line.r!=='group';
    return `<div class="ledger-row"><span class="ledger-rnd ${knock?'knock':''}">${ROUND_LABEL[line.r]}</span><div class="chips">${chips}</div><span class="ledger-pts">${pts}</span></div>`;
  }).join('');
  return `<div class="pcard ${open?'open':''}">
    <div class="pcard-head" onclick="togglePlayer('${pl.id}')">
      <span class="pos-chip">${pl.pos}</span>
      <span class="pcard-name">${pl.name} <span class="muted" style="font-weight:400">· ${t.name}</span></span>
      ${el?'<span class="pill elig">#'+t.rank+'</span>':'<span class="pill">#'+t.rank+'</span>'}
      <span class="pcard-total ${open?'':'dim'}">${tot.total}</span>
      <i class="ti ti-chevron-down chev"></i>
    </div>
    <div class="pcard-body">
      <div class="muted" style="font-size:.72rem;margin-bottom:.5rem">Reached: ${stageTag}</div>
      <div class="round-bar">${bar}</div>
      ${ledger}
    </div></div>`;
}
function stageLabel(s){ return {group:'Group stage',r16:'Round of 16',qf:'Quarter-final',sf:'Semi-final',final:'Final',champion:'Champion'}[s]||s; }

/* ============ VIEW: PLAYERS (leaderboard) ============ */
function viewPlayers(){
  if(!state.started) return emptyState('ti-list-numbers','Draft or simulate to see the player leaderboard.');
  const owner={}; state.picks.forEach(pk=>owner[pk.playerId]=pk.mgrIdx);
  const rows=state.picks.map(pk=>{ const pl=provider.getPlayer(pk.playerId); const tot=provider.totals(pk.playerId);
    return {pl,tot,mgr:pk.mgrIdx}; }).sort((a,b)=>b.tot.total-a.tot.total);
  const body=rows.map((r,i)=>`<tr>
    <td style="color:var(--muted)">${i+1}</td>
    <td><b>${r.pl.name}</b><div class="muted" style="font-size:.72rem">${provider.getTeam(r.pl.team).name}</div></td>
    <td><span class="pos-chip">${r.pl.pos}</span></td>
    <td>${MANAGERS[r.mgr].replace('Manager ','Mgr ')}</td>
    <td style="text-align:right;font-weight:800;color:var(--orange)">${r.tot.total}</td></tr>`).join('');
  return `<h2 class="page-title">Player leaderboard</h2><div class="card scroll-x"><table class="tbl">
    <thead><tr><th>#</th><th>Player</th><th>Pos</th><th>Manager</th><th style="text-align:right">Pts</th></tr></thead>
    <tbody>${body}</tbody></table></div>`;
}

/* ============ VIEW: SCORING RUBRIC (from SCORING config) ============ */
function viewScoring(){
  const s=SCORING;
  const row=(label,val,neg)=>`<div class="rubric-row"><div class="rubric-label">${label}</div><div class="rubric-val ${neg?'neg':'pos'}">${val>0?'+':''}${val}</div></div>`;
  return `<h2 class="page-title">Scoring</h2>
  <div class="banner"><i class="ti ti-info-circle"></i><div>This is the exact rubric the engine uses. Every chip on a player's card is one of these lines. Goals are weighted by position.</div></div>
  <div class="card">
    <div class="section-h">Goals</div>
    <div class="rubric-grid">
      ${row('Goal — goalkeeper',s.goal.GK)}${row('Goal — defender',s.goal.DEF)}${row('Goal — midfielder',s.goal.MID)}${row('Goal — forward',s.goal.FWD)}
    </div>
    <div class="section-h">Creation & minutes</div>
    <div class="rubric-grid">
      ${row('Assist',s.assist)}${row('Played 60+ minutes',s.played60)}${row('Played 1–59 minutes',s.appearance)}
    </div>
    <div class="section-h">Clean sheets (60+ min, team concedes 0)</div>
    <div class="rubric-grid">
      ${row('Goalkeeper / defender',s.cleanSheet.GK)}${row('Midfielder',s.cleanSheet.MID)}
    </div>
    <div class="section-h">Deductions</div>
    <div class="rubric-grid">
      ${row('Yellow card',s.yellow,true)}${row('Red card',s.red,true)}${row('Own goal',s.ownGoal,true)}${row('Penalty missed',s.penMiss,true)}
    </div>
  </div>
  <div class="card" style="margin-top:1rem">
    <div class="section-h" style="margin-top:0">Roster requirement</div>
    <div class="muted" style="font-size:.86rem">Each manager must draft at least <b style="color:var(--text)">${REQUIRE_ELIGIBLE} players from teams ranked 40th or lower</b> in the FIFA rankings. Goalkeeper saves are not scored. Points stop accruing once a player's nation is knocked out.</div>
  </div>`;
}

/* ============ VIEW: UNDRAFTED ============ */
function viewUndrafted(){
  const taken=draftedIds();
  const list=PLAYERS.filter(p=>!taken.has(p.id)).sort((a,b)=>provider.totals(b.id).total-provider.totals(a.id).total);
  const body=list.map(p=>`<tr><td><b>${p.name}</b><div class="muted" style="font-size:.72rem">${provider.getTeam(p.team).name}</div></td>
    <td><span class="pos-chip">${p.pos}</span></td><td><span class="pill ${provider.isEligible(p.id)?'elig':''}">#${provider.getTeam(p.team).rank}</span></td>
    <td style="text-align:right;font-weight:700">${provider.totals(p.id).total}</td></tr>`).join('');
  return `<h2 class="page-title">Undrafted (${list.length})</h2>
    <div class="card scroll-x"><table class="tbl"><thead><tr><th>Player</th><th>Pos</th><th>Rank</th><th style="text-align:right">Pts</th></tr></thead><tbody>${body}</tbody></table></div>`;
}

/* ============ VIEW: TOOLS ============ */
function viewTools(){
  return `<h2 class="page-title">Tools</h2>
    <div class="card">
      <div class="section-h" style="margin-top:0">2022 test simulation</div>
      <p class="muted" style="font-size:.85rem;margin-bottom:.8rem">Auto-drafts a full, requirement-valid 10×10 draft from the curated 2022 pool, then scores it from real goals and assists so you can sanity-check totals and standings.</p>
      <div class="toolbar"><button class="btn btn-primary" onclick="runSimulation()">Run 2022 simulation</button>
        <button class="btn btn-ghost" onclick="clearDraft()">Clear draft</button></div>
      <div class="section-h">Draft edits</div>
      <div class="toolbar"><button class="btn btn-ghost" onclick="undoLast()">Undo last pick</button>
        <button class="btn btn-ghost" onclick="promptEdit()">Edit a pick…</button></div>
      <div class="section-h">Save / load (local test persistence)</div>
      <div class="toolbar"><button class="btn btn-ghost" onclick="exportState()">Export JSON</button>
        <label class="btn btn-ghost" style="display:inline-block">Import JSON<input type="file" accept="application/json" style="display:none" onchange="importState(event)"></label></div>
    </div>
    <div class="banner" style="margin-top:1rem"><i class="ti ti-bulb"></i><div>In the live build this data layer is swapped for the official 2026 squads and a stats feed; the scoring engine and these screens stay the same. Multiplayer drafting (each manager on their own device) is added with a shared backend.</div></div>`;
}
function promptEdit(){ const n=prompt('Edit which overall pick number? (1–'+state.picks.length+')'); const o=parseInt(n,10)-1; if(!isNaN(o)) editPick(o); }
function exportState(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='silver-madness-2-draft.json'; a.click(); }
function importState(e){ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ try{ state=JSON.parse(r.result); saveState(); render(); }catch(err){ alert('Could not read that file.'); } }; r.readAsText(f); }

/* ============ VIEW: MORE (mobile) ============ */
function viewMore(){
  const items=[['draft','Draft board','ti-clipboard-list'],['undrafted','Undrafted players','ti-user-search'],['tools','Tools & simulation','ti-settings']];
  return `<h2 class="page-title">More</h2><div class="card" style="padding:.4rem">
    ${items.map(it=>`<button class="btn btn-ghost" style="width:100%;text-align:left;margin:.25rem 0;display:flex;align-items:center;gap:.6rem" onclick="go('${it[0]}')"><i class="ti ${it[2]}" style="font-size:1.2rem"></i>${it[1]}</button>`).join('')}
  </div>`;
}

function emptyState(icon,msg){ return `<div class="empty-state"><i class="ti ${icon}"></i><p>${msg}</p></div>`; }

/* ============ PASSWORD / BOOT ============ */
function checkPw(){ const v=document.getElementById('pwInput').value.trim(); if(v===PASSWORD){ document.getElementById('pwScreen').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); loadState(); ui.page=isDraftComplete()||state.started?'standings':'draft'; render(); } else { document.getElementById('pwErr').textContent='Incorrect password'; } }
document.getElementById('pwInput').addEventListener('keydown',e=>{ if(e.key==='Enter') checkPw(); });
</script></body></html>
